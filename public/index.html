<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:380px;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

.message{
    margin-top:15px;
    text-align:center;
    color:red;
}

.link{
    text-align:center;
    margin-top:18px;
}

a{
    text-decoration:none;
    color:#2563eb;
}
</style>

</head>
<body>

<div class="container">

<h2>Login</h2>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<div class="message" id="msg"></div>

<div class="link">
Don't have an account?
<a href="signup.html">Signup</a>
</div>

</div>

<script>

async function login(){

const username=document.getElementById("username").value;
const password=document.getElementById("password").value;

const res=await fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,
password
})

});

const data=await res.json();

document.getElementById("msg").innerHTML=data.message;

if(data.success){

window.location.href="dashboard.html";

}

}

</script>

</body>
</html>
